<body>

    <!-- HEADER -->
    <div id="site-header"></div>
    <section class="review-page-section">
        <div class="container">
            <div class="review-header">
                <div class="review-badge">
                    <i class="fab fa-google"></i>
                    Trusted Google Reviews
                </div>
                <h1 class="review-title">
                    Customer <span>Reviews</span>
                </h1>

                <p class="review-subtitle">
                    Read genuine experiences shared by our happy customers from Ahmedabad.
                    Discover why Shree Hari Chasma Ghar is trusted for premium eyeglasses,
                    sunglasses, contact lenses, and eye testing services.
                </p>
            </div>

            <div class="review-grid" id="reviewContainer">
                <div class="review-loader">
                    Loading Reviews...
                </div>
            </div>
        </div>
    </section>
    <!-- FOOTER -->
    <div id="site-footer"></div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Layout -->
    <script src="/assets/js/layout.js"></script>

    <script>
        async function loadReviews() {
            try {
                const response = await fetch('/assets/data/google_review.txt');
                const text = await response.text();
                const lines = text.split('\n');
                let html = '';
                lines.forEach(line => {
                    if (!line.trim()) return;
                    const data = line.split('~');

                    const name =
                        data[0]?.trim() || '';

                    const review =
                        data.slice(1, data.length - 1)
                            .join(' ')
                            .trim();

                    const image =
                        data[data.length - 1]
                            ?.trim() || '';

                    const username = '@' + name
                        .toLowerCase()
                        .replace(/\s+/g, '');

                    html += `

                    <a href="https://g.page/r/CZSFGqPqSPBmEB0/review" class="review-link"
                       target="_blank">
                        <div class="review-card">
                            <div class="review-top">
                                <div class="review-profile">
                                    <img src="${image}" alt="${name}">
                                    <div class="review-user">
                                        <strong>${name}</strong>
                                        <span>${username}</span>
                                    </div>
                                </div>
                                <div class="google-icon">
                                    <i class="fab fa-google"></i>
                                </div>
                            </div>

                            <div class="review-stars">
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                                <i class="fas fa-star"></i>
                            </div>

                            <div class="review-text">
                                ${review}
                            </div>

                            <div class="review-footer">
                                <div class="verified">
                                    ✔ Verified Google Review
                                </div>

                                <div class="review-btn">
                                    Read More
                                </div>

                            </div>
                        </div>
                    </a>
                    `;
                });
                document.getElementById('reviewContainer').innerHTML = html;
            }
            catch (error) {
                document.getElementById('reviewContainer').innerHTML = `
                    <div class="loader">
                        Failed To Load Reviews
                    </div>
                `;
                console.error(error);
            }
        }
        loadReviews();
    </script>
